name: Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set package version
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore AspNetSaml/AspNetSaml.csproj

      - name: Pack
        run: dotnet pack AspNetSaml/AspNetSaml.csproj --configuration Release --no-restore --output ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" ./artifacts/*.nupkg --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate